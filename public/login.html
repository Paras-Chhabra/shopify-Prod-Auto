<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product Automator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(12px);
            animation: fadeSlideUp 0.5s ease forwards;
        }

        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .login-logo-icon {
            width: 64px;
            height: 64px;
            background: var(--gradient-accent);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: var(--shadow-glow);
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .login-form {
            text-align: left;
        }

        .login-form .form-group {
            margin-bottom: 24px;
        }
        
        .error-message {
            color: var(--error);
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">⚡</div>
            <div>
                <h1 class="login-title">Internal Tool Access</h1>
                <p class="login-subtitle">Product Automator Dashboard</p>
            </div>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" class="form-input" placeholder="Enter password" required autofocus>
                <div id="errorMessage" class="error-message"></div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                <span class="btn-text">Secure Login</span>
                <span class="btn-loader hidden"></span>
            </button>
        </form>
    </div>

    <script src="login.js"></script>
</body>

</html>
